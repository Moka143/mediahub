name: flutter_torrent_client
description: "MediaHub — a cross-platform Flutter desktop media client."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.10.4

dependencies:
  flutter:
    sdk: flutter

  # HTTP client for API calls
  dio: ^5.9.0
  
  # State management
  flutter_riverpod: ^3.2.0
  
  # Local storage
  shared_preferences: ^2.5.4
  
  # File operations
  file_picker: ^10.3.8
  path_provider: ^2.1.5
  
  # Process management for qBittorrent
  process_run: ^1.2.4
  
  # URL handling
  url_launcher: ^6.3.2
  
  # Window management for desktop
  window_manager: ^0.5.1
  
  # Date/time formatting
  intl: ^0.20.2
  
  # Icons
  cupertino_icons: ^1.0.8

  # Cached network images for posters
  cached_network_image: ^3.4.1

  # Cross-platform video player with libmpv backend (all codecs)
  media_kit: ^1.2.6
  media_kit_video: ^2.0.1
  media_kit_libs_video: ^1.0.7

  # File system watcher for detecting new downloads
  watcher: ^1.1.0

  # Crypto for file hashing
  crypto: ^3.0.3

  # Cross-platform path joining (Windows/macOS/Linux)
  path: ^1.9.0

  # Algorithm helpers (firstWhereOrNull, etc.) — used directly in streaming/media code
  collection: ^1.19.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.2

  # Windows MSIX installer generator
  msix: ^3.16.8

msix_config:
  display_name: MediaHub
  publisher_display_name: MediaHub
  identity_name: com.mediahub.desktop
  publisher: CN=MediaHub
  msix_version: 1.0.0.0
  logo_path: assets\icon.png
  capabilities: internetClient, privateNetworkClientServer, runFullTrust
  architecture: x64
  output_path: build\windows\msix
  output_name: mediahub
  store: false

flutter_icons:
  android: false
  ios: false
  image_path: "assets/icon.png"
  windows:
    generate: true
  macos:
    generate: true

# For information on the generic Dart part of this file, see the
# following page: https://dart.dev/tools/pub/pubspec

# The following section is specific to Flutter packages.
flutter:

  # The following line ensures that the Material Icons font is
  # included with your application, so that you can use the icons in
  # the material Icons class.
  uses-material-design: true

  # To add assets to your application, add an assets section, like this:
  # assets:
  #   - images/a_dot_burr.jpeg
  #   - images/a_dot_ham.jpeg
  assets:
    - assets/icon.png

  # An image asset can refer to one or more resolution-specific "variants", see
  # https://flutter.dev/to/resolution-aware-images

  # For details regarding adding assets from package dependencies, see
  # https://flutter.dev/to/asset-from-package

  # To add custom fonts to your application, add a fonts section here,
  # in this "flutter" section. Each entry in this list should have a
  # "family" key with the font family name, and a "fonts" key with a
  # list giving the asset and other descriptors for the font. For
