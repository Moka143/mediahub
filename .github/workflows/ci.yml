name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  analyze:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true
      - run: flutter pub get
      - name: Format check
        run: dart format --output=none --set-exit-if-changed lib test
      - name: Analyze (fail on errors only)
        run: flutter analyze --no-fatal-infos --no-fatal-warnings
      - name: Test
        run: flutter test
