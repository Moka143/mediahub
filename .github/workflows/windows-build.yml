name: Windows Build

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]
  workflow_dispatch:

# Belt-and-braces opt-in to Node.js 24 for any JavaScript action that
# still bundles Node 20 internally. GitHub will force-flip this default
# on June 2, 2026; setting it now removes the runtime-deprecation
# annotation and protects against any laggard action publisher.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v6

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Flutter version
        run: flutter --version

      - name: Install dependencies
        run: flutter pub get

      - name: Analyze (fail on errors only)
        run: flutter analyze --no-fatal-infos --no-fatal-warnings

      - name: Run tests
        run: flutter test

      - name: Build Windows release
        # Releases ship without a bundled TMDB token — each user pastes
        # their own free Read Access Token on first launch. The bundled
        # --dart-define plumbing is still in lib/providers/settings_provider.dart
        # if you ever want to add one; just set the TMDB_READ_ACCESS_TOKEN
        # secret and re-add the --dart-define here.
        run: flutter build windows --release

      - name: Package MSIX installer
        run: dart run msix:create --sign-msix false --install-certificate false

      - name: Upload unpacked Release build
        uses: actions/upload-artifact@v7
        with:
          name: mediahub-windows-unpacked
          path: build/windows/x64/runner/Release/
          if-no-files-found: error

      - name: Upload MSIX installer
        uses: actions/upload-artifact@v7
        with:
          name: mediahub-msix
          path: build/windows/msix/*.msix
          if-no-files-found: error

  release:
    needs: build-windows
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download MSIX
        uses: actions/download-artifact@v8
        with:
          name: mediahub-msix
          path: release-assets

      - name: Download unpacked Release
        uses: actions/download-artifact@v8
        with:
          name: mediahub-windows-unpacked
          path: unpacked

      - name: Zip portable build
        run: |
          cd unpacked
          zip -rq "../release-assets/mediahub-${GITHUB_REF_NAME}-windows-portable.zip" .

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          files: release-assets/*
          generate_release_notes: true
