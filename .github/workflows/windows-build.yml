name: Windows Build

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Flutter version
        run: flutter --version

      - name: Install dependencies
        run: flutter pub get

      - name: Analyze (fail on errors only)
        run: flutter analyze --no-fatal-infos --no-fatal-warnings

      - name: Run tests
        run: flutter test

      - name: Build Windows release
        run: flutter build windows --release

      - name: Package MSIX installer
        run: dart run msix:create

      - name: Upload unpacked Release build
        uses: actions/upload-artifact@v4
        with:
          name: mediahub-windows-unpacked
          path: build/windows/x64/runner/Release/
          if-no-files-found: error

      - name: Upload MSIX installer
        uses: actions/upload-artifact@v4
        with:
          name: mediahub-msix
          path: build/windows/msix/*.msix
          if-no-files-found: error

  release:
    needs: build-windows
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: mediahub-msix
          path: release-assets

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: release-assets/*.msix
          generate_release_notes: true
