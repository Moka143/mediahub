name: Windows Build

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Flutter version
        run: flutter --version

      - name: Install dependencies
        run: flutter pub get

      - name: Analyze (fail on errors only)
        run: flutter analyze --no-fatal-infos --no-fatal-warnings

      - name: Run tests
        run: flutter test

      - name: Build Windows release
        env:
          # When set in repo secrets, the build bundles a default TMDB v4
          # Read Access Token so release users can skip the onboarding paste
          # step. If unset, the secret evaluates to an empty string and the
          # app falls back to asking for one on first launch.
          #
          # The new secret name is `TMDB_READ_ACCESS_TOKEN`; the legacy
          # `TMDB_API_KEY` name is also read for backward compatibility, but
          # a v3 api_key won't authenticate as a v4 Bearer — store a v4
          # Read Access Token (JWT) under either secret.
          TMDB_READ_ACCESS_TOKEN: ${{ secrets.TMDB_READ_ACCESS_TOKEN }}
          TMDB_API_KEY: ${{ secrets.TMDB_API_KEY }}
        run: >
          flutter build windows --release
          --dart-define=TMDB_READ_ACCESS_TOKEN=$env:TMDB_READ_ACCESS_TOKEN
          --dart-define=TMDB_API_KEY=$env:TMDB_API_KEY

      - name: Package MSIX installer
        run: dart run msix:create --sign-msix false --install-certificate false

      - name: Upload unpacked Release build
        uses: actions/upload-artifact@v4
        with:
          name: mediahub-windows-unpacked
          path: build/windows/x64/runner/Release/
          if-no-files-found: error

      - name: Upload MSIX installer
        uses: actions/upload-artifact@v4
        with:
          name: mediahub-msix
          path: build/windows/msix/*.msix
          if-no-files-found: error

  release:
    needs: build-windows
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download MSIX
        uses: actions/download-artifact@v4
        with:
          name: mediahub-msix
          path: release-assets

      - name: Download unpacked Release
        uses: actions/download-artifact@v4
        with:
          name: mediahub-windows-unpacked
          path: unpacked

      - name: Zip portable build
        run: |
          cd unpacked
          zip -rq "../release-assets/mediahub-${GITHUB_REF_NAME}-windows-portable.zip" .

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: release-assets/*
          generate_release_notes: true
